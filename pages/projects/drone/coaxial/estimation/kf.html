  <chapter style="counter-reset: chapter 3"><h1>Kalman filter</h1>
<section id="0"><h1>Overview</h1>
  There is uncertainty associated with:
  <ul>
    <li>Sensor measurements</li>
    Due to sensor inaccuracy, captured by covariance matrix $Q$.

    <p>
      <li>State predictions</li>
      Due to a system's inability to precisely execute a given command, captured by covariance matrix $R$.
    </p>
  </ul>
</section>
