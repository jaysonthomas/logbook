  <chapter style="counter-reset: chapter 3"><h1>Overview</h1>
  Static friction (stiction) is present when a vehicle is stationary.

  <p>
    At very low speeds, deformation (squishing) of tyres is the main drag. Viscous friction is low due to the low speed.
  </p>

  At higher speeds, viscous friction becomes more significant.
