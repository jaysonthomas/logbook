  <chapter style="counter-reset: chapter 3"><h1>Miscellaneous definitions</h1>
<section id="0"><h1>Limit</h1>
  A <i>limit</i> is a value toward which an expression converges as one or more variables approach certain values.
</section>

<section id="1"><h1>Argmin</h1>
  $argmin_x f(x)$ is the value of $x$ (referred by the subscript) for which $f(x)$ attains its minimum.
</section>
