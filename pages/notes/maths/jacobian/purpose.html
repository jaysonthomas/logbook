  <chapter style="counter-reset: chapter 3"><h1>Purpose</h1>
  A Jacobian matrix captures how a change in an input space affects the output space. It has $n$ rows and $m$ columns.
  
  <p>
    Each column of the Jacobian matrix captures how a change in any of the $m$ input space variables affects the $n$-dimensional vector in the output space.
  </p>
