  <chapter style="counter-reset: chapter 0"><h1>Kinematics: Cart</h1>
<section id="0"><h1>Translational motion</h1>
  The centre of mass of the cart moves with velocity $\dot{x}$ in the $\hat{i}$ direction.
  $$
    \newcommand{\wrt}[4]{^{\scriptsize{#1}\hspace{#2em}}{#3}^{\scriptsize{#4}}}
    \wrt{W}{-0.3}{v}{A} = \dot{x}\, \hat{i}
  $$
</section>
