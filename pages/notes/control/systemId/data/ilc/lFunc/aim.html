  <chapter style="counter-reset: chapter 0"><h1>Learning function</h1>
<section id="0"><h1>Question</h1>
  The learning function $L$ needs to be selected such that the error at the previous iteration $E_k$ is multipled by a number that is less than 1 to get the new reduced error $E_{k+1}$. Thus the following condition needs to be satisfied:
  
  $$
    |I - GL| &lt 1
  $$
