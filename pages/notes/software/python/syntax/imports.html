  <chapter style="counter-reset: chapter 1"><h1>Python: Imports</h1>
<section id="0"><h1>Overview</h1>
  [<a href="https://bit.ly/3FpJ3cK">Ref</a>]<p></p>
  
  If folder <code>a</code> contains:
  <ul>
    <li><code>a.py</code></li>
    <li>folder <code>b</code> which contains <code>b.py</code></li>
  </ul>
  
  To access code in <code>a.py</code> from <code>b.py</code>, one method is for <code>a</code> to be defined as a package by placing <code>__init__.py</code> within it. Then, a relative import can be used such as <code>from .. import a</code>.
</section>
