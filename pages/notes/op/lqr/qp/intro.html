<chapter style="counter-reset: chapter 0"><h1>Introduction</h1>
  The <a href="../intro.html">LQR problem</a> is linear. Since no linearisation is required, it can be:
  <ul>
    <li>Reformulated as a <a href="../../qp/main.html">QP</a></li>
    <li>Then, stacked as a (KKT) linear system</li>
    <li>And solved using Newton's method <n>in a single iteration</n></li>
  </ul>
