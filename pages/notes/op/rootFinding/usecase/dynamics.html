  <chapter style="counter-reset: chapter 3"><h1>Dynamics</h1>
  At an equilibrium point, the derivative is 0.

  <p>
    In discrete time, for a function that takes in the current state and outputs the next state, at equilibrium, the states don't change, i.e. the current state becomes a fixed point.
    
    $$
      f(x^*) = x^*
    $$
  </p>
