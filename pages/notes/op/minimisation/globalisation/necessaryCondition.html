  <chapter style="counter-reset: chapter 3"><h1>Necessary condition</h1>
<section id="0"><h1>Overview</h1>
  The Jacobian $\frac{\partial{f}}{\partial{x}}\bigg|_{x^*}$ can be 0 at a max, min or a saddle point. $\nabla{f} = 0$ is a first order (since it depends on the first derivative) necessary condition for a minimum. This is not a sufficient condition.
</section>
