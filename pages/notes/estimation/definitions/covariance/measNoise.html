  <chapter style="counter-reset: chapter 0"><h1>Measurement noise covariance</h1>
<section id="0"><h1>Definition</h1>
  If $v$ is the measurement noise, the covariance is defined as:
  $$
    R = E[(v-E[v])(v-E[v])^T]
  $$

  $E[.]$ is the expected value.
</section>
